<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz0r - Error</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      max-width: 500px;
      text-align: center;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: #ff6b6b;
    }
    p {
      color: #aaa;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .hint {
      background: #16213e;
      border-radius: 8px;
      padding: 1rem;
      font-size: 0.875rem;
      color: #888;
    }
    code {
      background: #0f0f23;
      padding: 0.2em 0.4em;
      border-radius: 4px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Failed to Load Application</h1>
    <p>The Quiz0r server could not be started. This may be due to a missing dependency or configuration issue.</p>
    <div class="hint">
      <p>To debug, run the app from terminal:</p>
      <code>ELECTRON_DEV_TOOLS=1 open Quiz0r.app</code>
    </div>
  </div>
</body>
</html>
